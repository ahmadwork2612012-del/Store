<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Product Form</title>
</head>

<body>

    <div class="container">

        <div id="form-page">

            <h1>Product Form</h1>

            <div id="error-message" style="display: none;">
                <h3>ERROR , Enter valid data</h3>
            </div>

            <div id="complete-message" style="display: none;">
                <h3>Product added successfully!</h3>
            </div>

            <div id="delete-message" style="display: none;">
                <h3>Product deleted successfully!</h3>
            </div>

            <div id="edit-message" style="display: none;">
                <h3>Product updated successfully!</h3>
            </div>

            <div id="empty-message" style="display: none;">
                <h3>No products available, Please add some products.</h3>
            </div>

            <form id="form">
                <div class="form-group">

                    <input id="name" type="text" placeholder="ضع اسم المنتج">
                    <input id="price" type="number" placeholder="ضع سعر المنتج">

                    <input id="color" type="text" placeholder="لون المنتج (اختياري)">

                    <input id="quantity" type="number" placeholder="الكمية">

                    <select id="select">
                        <option value="main">اختر نوع المنتج</option>
                        <option value="clothes">ملابس</option>
                        <option value="electronics">الكترونيات</option>
                        <option value="books">كتب</option>
                        <option value="food">طعام</option>
                        <option value="games">العاب</option>
                        <option value="shoes">أحذية</option>
                        <option value="accessories">إكسسوارات</option>
                        <option value="furniture">أثاث</option>
                    </select>

                    <input id="image" type="url" placeholder="ضع رابط صورة المنتج">
                    <input id="description" type="text" placeholder="ضع وصف المنتج">

                    <button type="submit" id="btn">اضافة المنتج</button>

                    <button type="button" onclick="toggleView()">عرض المنتجات</button>

                </div>
            </form>

        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
